name: Climate Pipeline

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch weather data
        run: python scripts/fetch.py

      - name: Preprocess & extract metrics
        run: python scripts/preprocess.py

      - name: ML inference & predictions
        run: python scripts/predict.py

      - name: Anomaly detection
        run: python scripts/anomaly.py

      - name: Generate dashboard data
        run: python scripts/dashboard.py

      - name: Commit & push
        run: |
          git config user.name  "climate-bot"
          git config user.email "climate-bot@users.noreply.github.com"

          git add data/ docs/data.json ml/ status.json

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%MZ")

          SUMMARY=$(python - <<'EOF'
          import json, sys
          try:
              rows = json.load(open("data/processed/latest.json"))
              parts = [f"{r['city'].split()[0]}: {r['temperature']}°C" for r in rows if r.get("temperature")]
              print(" | ".join(parts[:3]))
          except Exception:
              print("Tanzania weather update")
          EOF
          )

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "feat(pipeline): climate update ${TIMESTAMP} — ${SUMMARY}"
          git push
