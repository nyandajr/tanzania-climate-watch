name: Hourly Pipeline Summary Email

on:
  schedule:
    - cron: "0 * * * *"   # top of every hour
  workflow_dispatch:

jobs:
  send-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect last hour's pipeline runs
        id: summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUNS=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow pipeline.yml \
            --limit 10 \
            --json conclusion,createdAt,displayTitle,url \
            2>/dev/null || echo "[]")

          NOW=$(date -u +%s)
          ONE_HOUR_AGO=$(( NOW - 3600 ))

          SUCCESS=0
          FAILURE=0
          ROWS=""

          while IFS= read -r run; do
            CREATED=$(echo "$run" | python3 -c "
          import sys, json
          from datetime import datetime, timezone
          data = json.load(sys.stdin)
          dt = datetime.fromisoformat(data['createdAt'].replace('Z','+00:00'))
          print(int(dt.timestamp()))
          ")
            if [ "$CREATED" -ge "$ONE_HOUR_AGO" ]; then
              CONCLUSION=$(echo "$run" | python3 -c "import sys,json; print(json.load(sys.stdin).get('conclusion','unknown'))")
              TITLE=$(echo "$run"     | python3 -c "import sys,json; print(json.load(sys.stdin).get('displayTitle','')[:80])")
              TIME=$(echo "$run"      | python3 -c "import sys,json; print(json.load(sys.stdin).get('createdAt','')[:16])")
              URL=$(echo "$run"       | python3 -c "import sys,json; print(json.load(sys.stdin).get('url',''))")
              if [ "$CONCLUSION" = "success" ]; then
                SUCCESS=$(( SUCCESS + 1 ))
                ICON="✅"
              else
                FAILURE=$(( FAILURE + 1 ))
                ICON="❌"
              fi
              ROWS="${ROWS}<tr><td>${ICON} ${CONCLUSION}</td><td>${TIME} UTC</td><td>${TITLE}</td></tr>"
            fi
          done < <(echo "$RUNS" | python3 -c "import sys,json; [print(json.dumps(r)) for r in json.load(sys.stdin)]")

          TOTAL=$(( SUCCESS + FAILURE ))
          if [ "$FAILURE" -gt 0 ]; then
            STATUS_COLOR="#f85149"
            STATUS_TEXT="⚠️ ${FAILURE} failure(s) detected"
          else
            STATUS_COLOR="#3fb950"
            STATUS_TEXT="✅ All runs succeeded"
          fi

          HOUR=$(date -u +"%Y-%m-%d %H:00 UTC")

          BODY="<!DOCTYPE html><html><body style='font-family:sans-serif;background:#0d1117;color:#c9d1d9;padding:24px'>
          <h2 style='color:#58a6ff'>🌍 Tanzania Climate Pipeline — Hourly Summary</h2>
          <p style='color:#8b949e'>Period: <strong style='color:#c9d1d9'>${HOUR}</strong></p>
          <div style='background:#161b22;border:1px solid #21262d;border-radius:8px;padding:16px;margin:16px 0'>
            <p style='font-size:1.1rem;color:${STATUS_COLOR};margin:0'><strong>${STATUS_TEXT}</strong></p>
            <p style='color:#8b949e;margin:8px 0 0'>Total runs: ${TOTAL} &nbsp;|&nbsp; Successes: ${SUCCESS} &nbsp;|&nbsp; Failures: ${FAILURE}</p>
          </div>
          <table style='width:100%;border-collapse:collapse;background:#161b22;border-radius:8px;overflow:hidden'>
            <thead><tr style='background:#21262d'>
              <th style='padding:10px;text-align:left;color:#8b949e'>Status</th>
              <th style='padding:10px;text-align:left;color:#8b949e'>Time</th>
              <th style='padding:10px;text-align:left;color:#8b949e'>Commit</th>
            </tr></thead>
            <tbody>${ROWS}</tbody>
          </table>
          <p style='color:#484f58;font-size:0.8rem;margin-top:24px'>
            Tanzania Climate Watch — automated pipeline by nyandajr<br>
            <a href='https://nyandajr.github.io/tanzania-climate-watch/' style='color:#58a6ff'>View Dashboard</a>
          </p>
          </body></html>"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY"     >> $GITHUB_OUTPUT
          echo "EOF"       >> $GITHUB_OUTPUT
          echo "subject=Tanzania Pipeline: ${STATUS_TEXT} (${TOTAL} runs @ ${HOUR})" >> $GITHUB_OUTPUT

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: ${{ steps.summary.outputs.subject }}
          to: ${{ secrets.GMAIL_USERNAME }}
          from: Tanzania Climate Pipeline <${{ secrets.GMAIL_USERNAME }}>
          html_body: ${{ steps.summary.outputs.body }}
